<div class="page-header">
  <h2>Edit Product</h2>
  <p>Update the details of the existing inventory item.</p>
</div>

<div class="form-card">
  <div class="form-section">
    <form [formGroup]="productForm" (ngSubmit)="onSubmit()">

      <div class="form-grid">

        <div class="input-group">
          <label>Product Name (English) *</label>
          <input type="text" formControlName="nameEn" placeholder="e.g., Wireless Mouse">
        </div>

        <div class="input-group">
          <label>Product Name (Arabic) *</label>
          <input type="text" formControlName="nameAr" dir="rtl" placeholder="ماوس لاسلكي">
        </div>

        <div class="input-group">
          <label>Brand</label>
          <select formControlName="brandId">
            <option [ngValue]="null" disabled selected>Select Brand</option>
            <option *ngFor="let b of brands" [ngValue]="b.id">
              {{ b.nameEn }} | {{ b.nameAr }}
            </option>
          </select>
        </div>

        <div class="input-group">
          <label>Main Category *</label>
          <select formControlName="parentCategoryId">
            <option [ngValue]="null" disabled selected>Select Main Category</option>
            <option *ngFor="let cat of parentCategories" [ngValue]="cat.id">
              {{ cat.nameEn }} | {{ cat.nameAr }}
            </option>
          </select>
        </div>

        <div class="input-group" *ngIf="childCategories && childCategories.length > 0">
          <label>Sub Category *</label>
          <select formControlName="categoryId">
            <option [ngValue]="null" disabled selected>Select Sub Category</option>
            <option *ngFor="let child of childCategories" [ngValue]="child.id">
              {{ child.nameEn }} | {{ child.nameAr }}
            </option>
          </select>
        </div>

        <div class="input-group">
          <label>Unit *</label>
          <select formControlName="unit">
            <option *ngFor="let u of productUnits" [ngValue]="u">{{ u }}</option>
          </select>
        </div>

        <div class="input-group">
          <label>Unit Size *</label>
          <input type="number" step="any" formControlName="unitSize" placeholder="e.g., 1.5">
        </div>

        <div class="input-group full-width">
          <label>Description (English)</label>
          <textarea formControlName="descriptionEn" rows="4" placeholder="Enter product details..."></textarea>
        </div>

        <div class="input-group full-width">
          <label>Description (Arabic)</label>
          <textarea formControlName="descriptionAr" rows="4" dir="rtl" placeholder="أدخل تفاصيل المنتج..."></textarea>
        </div>

        <div class="input-group full-width">
          <label>Primary Image (Leave empty to keep existing)</label>
          <div class="file-upload-box">
            <input #fileInput type="file" (change)="onFileSelected($event)" accept="image/*">
          </div>

          <img [src]="path + imagePreview" alt="Product image preview">
        </div>

        <div class="input-group full-width details-section">
          <div class="details-header">
            <label>Product Details (Attributes)</label>
            <button type="button" class="btn-add-detail" (click)="addDetail()">
              + Add Detail
            </button>
          </div>

          <div formArrayName="details">
            <div *ngFor="let detail of details.controls; let i = index" [formGroupName]="i" class="detail-row">

              <select formControlName="attr_key_id">
                <option [ngValue]="null" disabled selected>Select Attribute...</option>
                <option *ngFor="let attr of allFeatures" [ngValue]="attr.id">{{ attr.attrKeyEn }}</option>
              </select>

              <input type="text" formControlName="valueEn" placeholder="Value (English)">

              <input type="text" formControlName="valueAr" dir="rtl" placeholder="القيمة (بالعربية)">

              <button type="button" class="btn-remove-detail" (click)="removeDetail(i)" title="Remove">
                &times;
              </button>
            </div>
          </div>

          <div *ngIf="details.length === 0" class="details-empty">
            No attributes added. Click "+ Add Detail" to specify specs like RAM, Color, etc.
          </div>
        </div>

      </div>

      <div class="form-actions">
        <button type="button" class="btn-cancel" (click)="onCancel()">Cancel</button>
        <button type="submit" class="btn-submit" [disabled]="productForm.invalid">Update Product</button>
      </div>

    </form>
  </div>
</div>
